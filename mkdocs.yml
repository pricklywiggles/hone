site_name: hone
site_description: Practice coding problems with spaced repetition
site_url: https://pricklywiggles.github.io/hone
repo_url: https://github.com/pricklywiggles/hone
repo_name: pricklywiggles/hone

theme:
  name: shadcn
  show_title: true
  show_stargazers: true
  topbar_sections: true

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.blocks.tab
  - attr_list
  - toc:
      permalink: true
  - tables
  - def_list

nav:
  - User Guide:
    - Welcome: index.md
    - Getting Started: guide/getting-started.md
    - Commands Reference: guide/commands.md
    - Dashboard Guide: guide/dashboard.md
    - Import & Export: guide/import-export.md
    - Configuration: guide/configuration.md
    - Concepts: guide/concepts.md
  - Developer:
    - Architecture: dev/architecture.md
    - TUI Development: dev/tui.md
    - Adding a Platform: dev/platforms.md
    - Testing: dev/testing.md
    - Contributing: dev/contributing.md

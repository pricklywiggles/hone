site_name: hone
site_description: Practice coding problems with spaced repetition
site_url: https://pricklywiggles.github.io/hone
repo_url: https://github.com/pricklywiggles/hone
repo_name: pricklywiggles/hone
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - search.suggest
    - search.highlight

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - tables
  - def_list

nav:
  - Home: index.md
  - User Guide:
    - Getting Started: guide/getting-started.md
    - Commands Reference: guide/commands.md
    - Dashboard Guide: guide/dashboard.md
    - Import & Export: guide/import-export.md
    - Configuration: guide/configuration.md
    - Concepts: guide/concepts.md
  - Developer:
    - Architecture: dev/architecture.md
    - TUI Development: dev/tui.md
    - Adding a Platform: dev/platforms.md
    - Testing: dev/testing.md
    - Contributing: dev/contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pricklywiggles/hone

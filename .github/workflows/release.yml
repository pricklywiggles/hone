name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Import code-signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          CERT_FILE=$(mktemp /tmp/cert.XXXXXX.p12)
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_FILE"

          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PWD=$(uuidgen)

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security import "$CERT_FILE" -P "$MACOS_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"

          rm "$CERT_FILE"

      - name: Verify signing identity
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          echo "Looking for identities:"
          security find-identity -v -p codesigning
          echo ""
          echo "MACOS_SIGN_IDENTITY is set: $( [ -n "$MACOS_SIGN_IDENTITY" ] && echo yes || echo no )"
          echo "Identity length: ${#MACOS_SIGN_IDENTITY}"

      - name: Debug codesign from sh -c
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          echo "=== Keychain search list ==="
          security list-keychains -d user
          echo ""
          echo "=== Default keychain ==="
          security default-keychain
          echo ""
          echo "=== Identities ==="
          security find-identity -v -p codesigning
          echo ""
          echo "=== Test from sh -c ==="
          sh -c 'security find-identity -v -p codesigning'

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}

      - name: Verify code signatures
        run: |
          for bin in dist/hone_darwin_*/hone; do
            echo "Verifying $bin..."
            codesign --verify --deep --strict "$bin"
            codesign -dv "$bin" 2>&1 | head -5
            echo ""
          done

      - name: Upload signed binaries for notarization
        uses: actions/upload-artifact@v4
        with:
          name: darwin-binaries
          path: dist/hone_darwin_*/hone
          retention-days: 1

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db || true

  notarize:
    needs: release
    runs-on: macos-latest
    steps:
      - name: Download signed binaries
        uses: actions/download-artifact@v4
        with:
          name: darwin-binaries
          path: dist

      - name: Restore executable permissions
        run: chmod +x dist/hone_darwin_*/hone

      - name: Verify code signatures survived artifact transfer
        run: |
          for bin in dist/hone_darwin_*/hone; do
            echo "Verifying $bin..."
            codesign --verify --deep --strict "$bin"
            codesign -dv "$bin" 2>&1 | head -3
            echo ""
          done

      - name: Notarize binaries
        env:
          APPLE_ID: ${{ secrets.MACOS_NOTARIZE_APPLE_ID }}
          APPLE_PWD: ${{ secrets.MACOS_NOTARIZE_PWD }}
          TEAM_ID: ${{ secrets.MACOS_NOTARIZE_TEAM_ID }}
        run: |
          for bin in dist/hone_darwin_*/hone; do
            dir="$(basename "$(dirname "$bin")")"
            echo "Notarizing $bin..."
            ZIP="/tmp/hone-${dir}.zip"
            rm -f "$ZIP"
            zip -j "$ZIP" "$bin"

            success=false
            for attempt in 1 2 3; do
              echo "  Attempt $attempt/3..."
              xcrun notarytool submit "$ZIP" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_PWD" \
                --team-id "$TEAM_ID" \
                --wait --timeout 15m \
                --output-format json > /tmp/notarize-result.json 2>&1 || true

              echo "  Result:"
              cat /tmp/notarize-result.json || true
              echo ""

              status=$(python3 -c "import json; d=json.load(open('/tmp/notarize-result.json')); print(d.get('status',''))" 2>/dev/null || echo "")
              if [ "$status" = "Accepted" ]; then
                echo "  Notarization accepted."
                success=true
                break
              fi

              if [ "$attempt" -lt 3 ]; then
                echo "  Retrying in 2 minutes..."
                sleep 120
              fi
            done

            if [ "$success" != "true" ]; then
              echo "::error::Notarization failed for $dir after 3 attempts"
              cat /tmp/notarize-result.json || true
              sub_id=$(python3 -c "import json; d=json.load(open('/tmp/notarize-result.json')); print(d.get('id',''))" 2>/dev/null || echo "")
              if [ -n "$sub_id" ]; then
                echo "Fetching notarization log for $sub_id..."
                xcrun notarytool log "$sub_id" \
                  --apple-id "$APPLE_ID" \
                  --password "$APPLE_PWD" \
                  --team-id "$TEAM_ID" || true
              fi
              exit 1
            fi

            rm -f "$ZIP"
          done
